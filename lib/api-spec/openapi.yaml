  # ── RESALE ──────────────────────────────────────────────────────────────────

  /resale:
    get:
      operationId: listResaleUnits
      tags: [resale]
      summary: List resale units
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: unitType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resale units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResaleUnit"
    post:
      operationId: createResaleUnit
      tags: [resale]
      summary: Create resale unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResaleUnitInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResaleUnit"

  /resale/{unitId}:
    get:
      operationId: getResaleUnit
      tags: [resale]
      summary: Get resale unit
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResaleUnit"
    patch:
      operationId: updateResaleUnit
      tags: [resale]
      summary: Update resale unit
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResaleUnitUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResaleUnit"
    delete:
      operationId: deleteResaleUnit
      tags: [resale]
      summary: Delete resale unit
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── CLIENTS ──────────────────────────────────────────────────────────────────

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{clientId}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client
      parameters:
        - name: clientId
          in: path
          required: true
