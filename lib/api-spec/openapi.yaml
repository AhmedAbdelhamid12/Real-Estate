  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/pipeline:
    get:
      operationId: getPipelineBreakdown
      tags: [dashboard]
      summary: Lead count by status
      responses:
        "200":
          description: Pipeline data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStage"

  /dashboard/top-performers:
    get:
      operationId: getTopPerformers
      tags: [dashboard]
      summary: Top sales performers
      responses:
        "200":
          description: Performers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerformerStat"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent lead activities across the team
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityFeedItem"

  # ── REPORTS ──────────────────────────────────────────────────────────────────

  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Sales performance report
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  /reports/leads:
    get:
      operationId: getLeadsReport
      tags: [reports]
      summary: Lead source & conversion report
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsReport"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── AUTH ────────────────────────────────────────────────────────────────

    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [ceo, admin, director, team_leader, sales]
        teamLeaderId:
          type: ["string", "null"]

    VerifyEmailInput:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6

